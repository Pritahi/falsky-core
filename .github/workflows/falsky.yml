name: Falsky CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CI: true
  CI_RUN_NUMBER: ${{ github.run_number }}

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ --junitxml=/tmp/test-results.xml -v || true

      - name: Analyze results with Falsky
        uses: Pritahi/falsky-action@v1
        with:
          junit-xml-path: '/tmp/test-results.xml'
          api-url: 'https://falsky-test.vercel.app'
          api-key: ${{ secrets.FALSKY_API_KEY }}
          repo-name: ${{ github.repository }}
          comment-on-pr: 'true'
          fail-on-flaky: 'false'
          flaky-threshold: '50'
